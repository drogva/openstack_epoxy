# 1. DB 및 권한 생성
- name: Placement 데이터베이스 생성
  mysql_db:
    login_user: root
    login_password: "{{ db_root_password }}"
    login_host: "{{ mgmt_ip }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    name: placement
    state: present

- name: Placement 데이터베이스 권한 부여
  mysql_user:
    login_user: root
    login_password: "{{ db_root_password }}"
    login_host: "{{ mgmt_ip }}"
    login_unix_socket: /var/lib/mysql/mysql.sock
    name: placement
    password: "{{PLACEMENT_DBPASS}}"
    priv: 'placement.*:ALL'
    host: "{{ item }}"
    state: present
  with_items: ['localhost', '%']

# 2. 계정 및 엔드포인트 생성
- name: Placement 사용자 생성
  openstack.cloud.identity_user:
    auth:
      auth_url: "http://{{ controller_host }}:5000/v3"
      username: "admin"
      password: "{{ keystone_admin_password }}"
      project_name: "admin"
      user_domain_name: "Default"
      project_domain_name: "Default"
    name: "placement"
    password: "{{PLACEMENT_PASS}}"
    domain: "default"
    state: present

- name: Placement 사용자에게 admin 역할 부여
  openstack.cloud.role_assignment:
    auth:
      auth_url: "http://{{ controller_host }}:5000/v3"
      username: "admin"
      password: "{{ keystone_admin_password }}"
      project_name: "admin"
      user_domain_name: "Default"
      project_domain_name: "Default"
    user: placement
    role: admin
    project: service
    state: present

- name: Placement 서비스 생성
  openstack.cloud.catalog_service:
    auth:
      auth_url: "http://{{ controller_host }}:5000/v3"
      username: "admin"
      password: "{{ keystone_admin_password }}"
      project_name: "admin"
      user_domain_name: "Default"
      project_domain_name: "Default"
    name: placement
    type: placement
    description: "Placement Service"
    state: present

- name: Placement 엔드포인트 생성
  openstack.cloud.endpoint:
    auth:
      auth_url: "http://{{ controller_host }}:5000/v3"
      username: "admin"
      password: "{{ keystone_admin_password }}"
      project_name: "admin"
      user_domain_name: "Default"
      project_domain_name: "Default"
    service: placement
    endpoint_interface: "{{ item.interface }}"
    url: "{{ item.url }}"
    region: RegionOne
    state: present
  with_items:
    - { interface: 'public', url: 'http://{{ controller_host }}:8778' }
    - { interface: 'internal', url: 'http://{{ controller_host }}:8778' }
    - { interface: 'admin', url: 'http://{{ controller_host }}:8778' }
# 3. 설치 및 설정
- name: Placement 패키지 설치
  dnf:
    name: openstack-placement-api
    state: present

- name: Apache Placement 설정 확인 (Listen 주소 수정)
  lineinfile:
    path: /etc/httpd/conf.d/00-placement-api.conf
    regexp: '^Listen'
    line: 'Listen 8778'  # 127.0.0.1 대신 모든 IP 허용
  notify: restart httpd

- name: placement.conf 설정 적용
  template:
    src: placement.conf.j2
    dest: /etc/placement/placement.conf
    owner: placement
    group: placement
    mode: '0640'


- name: Apache Placement API 설정 적용
  template:
    src: 00-placement-api.conf.j2
    dest: /etc/httpd/conf.d/00-placement-api.conf
  notify: restart httpd

# 4. DB Sync (가장 확실한 방법)
- name: Placement DB Sync
  shell: su -s /bin/sh -c "placement-manage db sync" placement
  register: placement_sync
  changed_when: "'Upgrading' in placement_sync.stdout or 'Successfully' in placement_sync.stdout"

# 5. 서비스 시작
- name: Apache 재시작 (Placement 적용)
  service:
    name: httpd
    state: restarted
